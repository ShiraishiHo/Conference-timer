<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&display=swap" rel="stylesheet">
    <title>学术会议倒计时</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            height: 100%; 
            background-color: #000000; 
            color: #ffffff; 
            font-family: 'Orbitron', sans-serif;
            overflow: hidden;
            user-select: none;
        }
        #setup {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
        }
        .title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5em;
            opacity: 0.3;
            margin-bottom: 50px;
        }
        .presets {
            display: flex;
            gap: 30px;
            margin-bottom: 60px;
        }
        .btn {
            background: none;
            border: none;
            color: white;
            font-size: 60px;
            font-weight: 900;
            cursor: pointer;
            font-family: inherit;
        }

        #timer-screen {
            display: none;
            height: 100%;
            width: 100%;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* 核心布局：三列网格确保冒号居中 */
        .display-wrapper {
            display: grid;
            grid-template-columns: 1fr auto 1fr; /* 分钟、冒号、秒钟 */
            align-items: center;
            width: 90vw;
            position: relative;
        }

        /* 共享的数字样式 */
        .digit-group {
            font-size: 24vw;
            font-weight: 900;
            line-height: 1;
            letter-spacing: 0.05em;
        }

        /* 底纹层 */
        .ghost-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            color: rgba(255, 255, 255, 0.05); /* 稍微加深一点底纹 */
            z-index: 1;
            pointer-events: none;
        }

        /* 真实数字层 */
        .active-layer {
            position: relative;
            display: grid;
            grid-template-columns: 1fr auto 1fr;
            align-items: center;
            z-index: 2;
            text-shadow: 0 0 20px rgba(255, 255, 255, 0.1);
        }

        .mins-part { text-align: right; }
        .secs-part { text-align: left; }
        .colon-part { 
            width: 6vw; 
            text-align: center; 
            margin-bottom: 2vw; /* 冒号微调 */
        }

        #reset-btn {
            position: absolute;
            bottom: 12%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 12px 40px;
            border-radius: 5px;
            font-size: 16px;
            font-family: inherit;
            letter-spacing: 4px;
            cursor: pointer;
            z-index: 10;
        }

        .warning { color: #facc15 !important; text-shadow: 0 0 30px rgba(250, 204, 21, 0.3) !important; }
        .danger { color: #ef4444 !important; text-shadow: 0 0 40px rgba(239, 68, 68, 0.4) !important; }
        .dim { opacity: 0.3; }
        
        #status-bar {
            position: absolute;
            bottom: 20px;
            font-size: 10px;
            opacity: 0.15;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
            width: 100%;
        }
    </style>
</head>
<body onclick="handleUserInteraction()" ontouchstart="handleUserInteraction()">

    <div id="setup">
        <div class="title">Academic Timer</div>
        <div class="presets">
            <button class="btn" onclick="startTimer(5)">5</button>
            <button class="btn" onclick="startTimer(10)">10</button>
            <button class="btn" onclick="startTimer(15)">15</button>
            <button class="btn" onclick="startTimer(20)">20</button>
        </div>
        <div id="status-bar">READY TO START</div>
    </div>

    <div id="timer-screen" onclick="togglePause()">
        <div class="display-wrapper">
            <!-- 底纹层：始终显示 88:88 -->
            <div class="ghost-layer digit-group">
                <div class="mins-part">88</div>
                <div class="colon-part">:</div>
                <div class="secs-part">88</div>
            </div>
            <!-- 真实数字层 -->
            <div class="active-layer digit-group" id="active-display">
                <div class="mins-part" id="mins">00</div>
                <div class="colon-part">:</div>
                <div class="secs-part" id="secs">00</div>
            </div>
        </div>
        <button id="reset-btn" onclick="event.stopPropagation(); reset()">RESET</button>
    </div>

    <script>
        let timeLeft = 0;
        let timerId = null;
        let isActive = false;
        let audioCtx = null;
        let wakeLock = null;

        const setupScreen = document.getElementById('setup');
        const timerScreen = document.getElementById('timer-screen');
        const minsDisplay = document.getElementById('mins');
        const secsDisplay = document.getElementById('secs');
        const activeDisplay = document.getElementById('active-display');
        const statusBar = document.getElementById('status-bar');

        function handleUserInteraction() {
            unlockAudio();
            if (isActive) requestWakeLock();
        }

        async function requestWakeLock() {
            if ('wakeLock' in navigator) {
                try {
                    if (wakeLock !== null) return;
                    wakeLock = await navigator.wakeLock.request('screen');
                    statusBar.innerText = "BELL READY | WAKE LOCK ON";
                    wakeLock.addEventListener('release', () => { wakeLock = null; });
                } catch (err) { console.error(err); }
            }
        }

        function releaseWakeLock() {
            if (wakeLock !== null) {
                wakeLock.release();
                wakeLock = null;
            }
        }

        document.addEventListener('visibilitychange', async () => {
            if (wakeLock !== null && document.visibilityState === 'visible' && isActive) {
                requestWakeLock();
            }
        });

        function unlockAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function startTimer(minutes) {
            isActive = true;
            timeLeft = minutes * 60;
            setupScreen.style.display = 'none';
            timerScreen.style.display = 'flex';
            requestWakeLock();
            updateDisplay();
            if (timerId) clearInterval(timerId);
            timerId = setInterval(tick, 1000);
        }

        function tick() {
            if (!isActive) return;
            timeLeft--;
            updateDisplay();
            if (timeLeft === 180) playBell(1);
            else if (timeLeft === 60) playBell(2);
            else if (timeLeft === 0) playBell(3);
        }

        function updateDisplay() {
            const absTime = Math.abs(timeLeft);
            const mins = Math.floor(absTime / 60).toString().padStart(2, '0');
            const secs = (absTime % 60).toString().padStart(2, '0');
            const sign = timeLeft < 0 ? '-' : '';
            
            // 分别更新分钟和秒钟
            minsDisplay.innerText = sign + mins;
            secsDisplay.innerText = secs;
            
            activeDisplay.classList.remove('warning', 'danger');
            if (timeLeft < 0 || timeLeft <= 10) activeDisplay.classList.add('danger');
            else if (timeLeft <= 60) activeDisplay.classList.add('warning');
        }

        function togglePause() {
            isActive = !isActive;
            activeDisplay.classList.toggle('dim', !isActive);
            if (isActive) requestWakeLock();
            else releaseWakeLock();
        }

        function reset() {
            clearInterval(timerId);
            isActive = false;
            releaseWakeLock();
            setupScreen.style.display = 'flex';
            timerScreen.style.display = 'none';
            statusBar.innerText = "READY TO START";
        }

        function playBell(count) {
            if (!audioCtx) return;
            function strike(timeOffset) {
                const now = audioCtx.currentTime + timeOffset;
                const frequencies = [700, 1050, 1470, 2100, 2800];
                const gains = [0.4, 0.2, 0.15, 0.1, 0.05];
                const decays = [1.5, 1.0, 0.8, 0.5, 0.3];
                frequencies.forEach((freq, i) => {
                    const osc = audioCtx.createOscillator();
                    const gainNode = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, now);
                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(gains[i], now + 0.01);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + decays[i]);
                    osc.connect(gainNode);
                    gainNode.connect(audioCtx.destination);
                    osc.start(now);
                    osc.stop(now + decays[i] + 0.1);
                });
            }
            for (let i = 0; i < count; i++) strike(i * 0.8);
        }
    </script>
</body>
</html>
