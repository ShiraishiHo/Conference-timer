<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json?v=2">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="AcaConf Timer">
    <link rel="apple-touch-icon" href="https://img.icons8.com/ios-filled/512/FFFFFF/stopwatch.png?v=3">
    <link href="https://fonts.cdnfonts.com/css/digital-7-mono" rel="stylesheet">
    <title>Academic Conference Timer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            height: 100%; 
            background-color: #000000; 
            color: #ffffff; 
            font-family: 'Digital-7 Mono', sans-serif;
            overflow: hidden;
            user-select: none;
        }
        #setup { display: flex; flex-direction: column; align-items: center; justify-content: center; height: 100%; }
        .setup-title { font-family: -apple-system, sans-serif; font-size: 12px; text-transform: uppercase; letter-spacing: 0.5em; opacity: 0.3; margin-bottom: 30px; }
        .adjuster-container { display: flex; align-items: center; justify-content: center; gap: 20px; margin-bottom: 40px; transform: skewX(-5deg); }
        .adjuster-group { display: flex; flex-direction: column; align-items: center; gap: 10px; }
        .adj-btn { background: rgba(255, 255, 255, 0.1); border: 1px solid rgba(255, 255, 255, 0.2); color: white; width: 60px; height: 40px; font-size: 24px; display: flex; align-items: center; justify-content: center; border-radius: 4px; cursor: pointer; }
        .setup-display { font-size: 15vw; line-height: 1; color: #ffffff; text-shadow: 0 0 10px rgba(255, 255, 255, 0.2); }
        .start-btn { font-family: -apple-system, sans-serif; background: #ffffff; color: #000000; border: none; padding: 15px 60px; font-size: 20px; font-weight: bold; border-radius: 5px; letter-spacing: 5px; cursor: pointer; margin-bottom: 40px; }
        .presets { display: flex; gap: 20px; margin-bottom: 30px; }
        .preset-btn { background: none; border: 1px solid rgba(255, 255, 255, 0.2); color: rgba(255, 255, 255, 0.5); padding: 8px 20px; font-size: 18px; border-radius: 4px; cursor: pointer; font-family: inherit; }
        
        /* 响铃设置样式 */
        .chime-config {
            display: flex;
            flex-direction: column;
            gap: 15px;
            font-family: -apple-system, sans-serif;
            width: 280px;
            padding: 20px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 10px;
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        .chime-config-title {
            font-size: 10px;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.4;
            text-align: center;
            margin-bottom: 5px;
        }
        .chime-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .chime-label {
            font-size: 12px;
            opacity: 0.6;
        }
        .chime-adj {
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .chime-val {
            font-family: 'Digital-7 Mono', sans-serif;
            font-size: 20px;
            width: 30px;
            text-align: center;
        }
        .chime-btn-sm {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            width: 28px;
            height: 28px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            cursor: pointer;
            font-size: 16px;
        }
        
        #timer-screen { display: none; height: 100%; width: 100%; flex-direction: column; align-items: center; justify-content: center; position: relative; }
        .display-wrapper { display: flex; align-items: center; justify-content: center; transform: skewX(-5deg); }
        .digit-box { display: grid; place-items: center; position: relative; width: 15vw; }
        .colon-box { display: grid; place-items: center; width: 6vw; margin-bottom: 2vw; }
        .sign-box { display: grid; place-items: center; width: 8vw; }
        .digit-text { grid-area: 1 / 1; font-size: 26vw; line-height: 1; text-align: center; }
        .ghost { color: rgba(255, 255, 255, 0.03); z-index: 1; }
        .active { color: #ffffff; z-index: 2; text-shadow: 0 0 10px rgba(255, 255, 255, 0.3); transition: color 0.3s ease; }
        #reset-btn { position: absolute; bottom: 10%; background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.2); color: white; padding: 10px 30px; border-radius: 2px; font-size: 14px; font-family: -apple-system, sans-serif; letter-spacing: 4px; cursor: pointer; z-index: 10; }
        .warning .active { color: #ffff00; text-shadow: 0 0 15px rgba(255, 255, 0, 0.4); }
        .danger .active { color: #ff0000; text-shadow: 0 0 20px rgba(255, 0, 0, 0.5); }
        .dim { opacity: 0.3; }
        #status-bar { position: absolute; bottom: 20px; font-size: 10px; opacity: 0.15; text-transform: uppercase; letter-spacing: 2px; text-align: center; width: 100%; font-family: -apple-system, sans-serif; }
    </style>
</head>
<body onclick="handleUserInteraction()" ontouchstart="handleUserInteraction()">
    <div id="setup">
        <div class="setup-title">Set Timer Duration</div>
        <div class="adjuster-container">
            <div class="adjuster-group">
                <div class="adj-btn" onclick="adjTime(60)">+</div>
                <div class="setup-display" id="setup-mins">10</div>
                <div class="adj-btn" onclick="adjTime(-60)">-</div>
            </div>
            <div class="setup-display">:</div>
            <div class="adjuster-group">
                <div class="adj-btn" onclick="adjTime(1)">+</div>
                <div class="setup-display" id="setup-secs">00</div>
                <div class="adj-btn" onclick="adjTime(-1)">-</div>
            </div>
        </div>
        <button class="start-btn" onclick="startTimer()">START</button>
        <div class="presets">
            <button class="preset-btn" onclick="setPreset(5)">5m</button>
            <button class="preset-btn" onclick="setPreset(10)">10m</button>
            <button class="preset-btn" onclick="setPreset(15)">15m</button>
            <button class="preset-btn" onclick="setPreset(20)">20m</button>
        </div>

        <!-- 响铃设置 UI -->
        <div class="chime-config">
            <div class="chime-config-title">Chime Settings (Minutes)</div>
            <div class="chime-row">
                <div class="chime-label">Chime 1 (1x)</div>
                <div class="chime-adj">
                    <div class="chime-btn-sm" onclick="adjChime(1, -1)">-</div>
                    <div class="chime-val" id="c1-val">3</div>
                    <div class="chime-btn-sm" onclick="adjChime(1, 1)">+</div>
                </div>
            </div>
            <div class="chime-row">
                <div class="chime-label">Chime 2 (2x)</div>
                <div class="chime-adj">
                    <div class="chime-btn-sm" onclick="adjChime(2, -1)">-</div>
                    <div class="chime-val" id="c2-val">1</div>
                    <div class="chime-btn-sm" onclick="adjChime(2, 1)">+</div>
                </div>
            </div>
            <div class="chime-row">
                <div class="chime-label">Chime 3 (3x)</div>
                <div class="chime-adj">
                    <div class="chime-btn-sm" onclick="adjChime(3, -1)">-</div>
                    <div class="chime-val" id="c3-val">0</div>
                    <div class="chime-btn-sm" onclick="adjChime(3, 1)">+</div>
                </div>
            </div>
        </div>

        <div id="status-bar" style="position: relative; margin-top: 40px; bottom: auto;">READY TO CONFIGURE</div>
    </div>
    <div id="timer-screen" onclick="togglePause()">
        <div class="display-wrapper" id="main-display">
            <div class="sign-box"><div class="digit-text active" id="sign"></div></div>
            <div class="digit-box"><div class="digit-text ghost">8</div><div class="digit-text active" id="m1">0</div></div>
            <div class="digit-box"><div class="digit-text ghost">8</div><div class="digit-text active" id="m2">0</div></div>
            <div class="colon-box"><div class="digit-text ghost">:</div><div class="digit-text active">:</div></div>
            <div class="digit-box"><div class="digit-text ghost">8</div><div class="digit-text active" id="s1">0</div></div>
            <div class="digit-box"><div class="digit-text ghost">8</div><div class="digit-text active" id="s2">0</div></div>
        </div>
        <button id="reset-btn" onclick="event.stopPropagation(); reset()">RESET</button>
    </div>
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('离线缓存就绪'))
                    .catch(err => console.log('注册失败', err));
            });
        }
        let setupTime = 600; 
        let timeLeft = 0;
        let timerId = null;
        let isActive = false;
        let audioCtx = null;
        let wakeLock = null;

        // 响铃设置（秒）
        let chime1 = parseInt(localStorage.getItem('chime1')) || 180; // 默认3分钟
        let chime2 = parseInt(localStorage.getItem('chime2')) || 60;  // 默认1分钟
        let chime3 = parseInt(localStorage.getItem('chime3')) || 0;   // 默认结束
        const setupScreen = document.getElementById('setup');
        const timerScreen = document.getElementById('timer-screen');
        const mainDisplay = document.getElementById('main-display');
        const statusBar = document.getElementById('status-bar');
        const elMinsSetup = document.getElementById('setup-mins');
        const elSecsSetup = document.getElementById('setup-secs');
        const elSign = document.getElementById('sign');
        const elM1 = document.getElementById('m1');
        const elM2 = document.getElementById('m2');
        const elS1 = document.getElementById('s1');
        const elS2 = document.getElementById('s2');
        function playClick() {
            if (!audioCtx) return;
            const now = audioCtx.currentTime;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.type = 'sine';
            osc.frequency.setValueAtTime(150, now);
            osc.frequency.exponentialRampToValueAtTime(40, now + 0.1);
            gainNode.gain.setValueAtTime(0.1, now);
            gainNode.gain.exponentialRampToValueAtTime(0.01, now + 0.1);
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.start(now);
            osc.stop(now + 0.1);
            if (navigator.vibrate) navigator.vibrate(10);
        }
        function adjTime(delta) {
            playClick();
            setupTime += delta;
            if (setupTime < 1) setupTime = 1;
            if (setupTime > 5999) setupTime = 5999;
            updateSetupDisplay();
        }
        function setPreset(mins) {
            playClick();
            setupTime = mins * 60;
            updateSetupDisplay();
        }
        function updateSetupDisplay() {
            const mins = Math.floor(setupTime / 60).toString().padStart(2, '0');
            const secs = (setupTime % 60).toString().padStart(2, '0');
            elMinsSetup.innerText = mins;
            elSecsSetup.innerText = secs;

            // 更新响铃设置显示
            document.getElementById('c1-val').innerText = Math.floor(chime1 / 60);
            document.getElementById('c2-val').innerText = Math.floor(chime2 / 60);
            document.getElementById('c3-val').innerText = Math.floor(chime3 / 60);
        }
        function adjChime(id, delta) {
            playClick();
            if (id === 1) {
                chime1 += delta * 60;
                if (chime1 < 0) chime1 = 0;
                localStorage.setItem('chime1', chime1);
            } else if (id === 2) {
                chime2 += delta * 60;
                if (chime2 < 0) chime2 = 0;
                localStorage.setItem('chime2', chime2);
            } else if (id === 3) {
                chime3 += delta * 60;
                if (chime3 < 0) chime3 = 0;
                localStorage.setItem('chime3', chime3);
            }
            updateSetupDisplay();
        }
        function handleUserInteraction() {
            unlockAudio();
            if (isActive) requestWakeLock();
        }
        async function requestWakeLock() {
            if ('wakeLock' in navigator) {
                try {
                    if (wakeLock !== null) return;
                    wakeLock = await navigator.wakeLock.request('screen');
                    statusBar.innerText = "BELL READY | WAKE LOCK ON";
                } catch (err) { console.error(err); }
            }
        }
        function releaseWakeLock() {
            if (wakeLock !== null) {
                wakeLock.release();
                wakeLock = null;
            }
        }
        function unlockAudio() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();
        }
        function startTimer() {
            playClick();
            isActive = true;
            timeLeft = setupTime;
            setupScreen.style.display = 'none';
            timerScreen.style.display = 'flex';
            requestWakeLock();
            updateDisplay();
            if (timerId) clearInterval(timerId);
            timerId = setInterval(tick, 1000);
        }
        function tick() {
            if (!isActive) return;
            timeLeft--;
            updateDisplay();
            if (timeLeft === chime1) playBell(1);
            else if (timeLeft === chime2) playBell(2);
            else if (timeLeft === chime3) playBell(3);
        }
        function updateDisplay() {
            const absTime = Math.abs(timeLeft);
            const mins = Math.floor(absTime / 60).toString().padStart(2, '0');
            const secs = (absTime % 60).toString().padStart(2, '0');
            elSign.innerText = timeLeft < 0 ? '-' : '';
            elM1.innerText = mins[0] || '0';
            elM2.innerText = mins[1] || '0';
            elS1.innerText = secs[0] || '0';
            elS2.innerText = secs[1] || '0';
            mainDisplay.classList.remove('warning', 'danger');
            if (timeLeft < 0 || timeLeft <= 10) mainDisplay.classList.add('danger');
            else if (timeLeft <= 60) mainDisplay.classList.add('warning');
        }
        function togglePause() {
            playClick();
            isActive = !isActive;
            timerScreen.classList.toggle('dim', !isActive);
            if (isActive) requestWakeLock();
            else releaseWakeLock();
        }
        function reset() {
            playClick();
            clearInterval(timerId);
            isActive = false;
            releaseWakeLock();
            setupScreen.style.display = 'flex';
            timerScreen.style.display = 'none';
            statusBar.innerText = "READY TO START";
            updateSetupDisplay();
        }
        function playBell(count) {
            if (!audioCtx) return;
            function strike(timeOffset) {
                const now = audioCtx.currentTime + timeOffset;
                // Higher frequencies and more inharmonic ratios for a "crisper" chime sound
                const frequencies = [1200, 1800, 2400, 3600, 5200];
                const gains = [0.3, 0.2, 0.15, 0.1, 0.05];
                const decays = [1.2, 0.8, 0.6, 0.4, 0.2];
                frequencies.forEach((freq, i) => {
                    const osc = audioCtx.createOscillator();
                    const gainNode = audioCtx.createGain();
                    // Use triangle for the fundamental to add a bit of "bite"
                    osc.type = i === 0 ? 'triangle' : 'sine';
                    osc.frequency.setValueAtTime(freq, now);
                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(gains[i], now + 0.005);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + decays[i]);
                    osc.connect(gainNode);
                    gainNode.connect(audioCtx.destination);
                    osc.start(now);
                    osc.stop(now + decays[i] + 0.1);
                });
            }
            for (let i = 0; i < count; i++) strike(i * 0.6);
        }
        updateSetupDisplay();
    </script>
</body>
</html>
