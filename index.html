<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <link rel="manifest" href="manifest.json">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <link href="https://fonts.cdnfonts.com/css/digital-7-mono" rel="stylesheet">
    <title>Academic Timer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            height: 100%; 
            background-color: #000000; 
            color: #ffffff; 
            font-family: 'Digital-7 Mono', sans-serif;
            overflow: hidden;
            user-select: none;
        }
        
        /* 设置界面样式 */
        #setup {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
        }
        .setup-title {
            font-family: -apple-system, sans-serif;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5em;
            opacity: 0.3;
            margin-bottom: 30px;
        }

        /* 手动调整区域 */
        .adjuster-container {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 40px;
            transform: skewX(-5deg);
        }
        .adjuster-group {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 10px;
        }
        .adj-btn {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            width: 60px;
            height: 40px;
            font-size: 24px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 4px;
            cursor: pointer;
        }
        .adj-btn:active { background: rgba(255, 255, 255, 0.3); }
        
        .setup-display {
            font-size: 15vw;
            line-height: 1;
            color: #ffffff;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.2);
        }

        .start-btn {
            font-family: -apple-system, sans-serif;
            background: #ffffff;
            color: #000000;
            border: none;
            padding: 15px 60px;
            font-size: 20px;
            font-weight: bold;
            border-radius: 5px;
            letter-spacing: 5px;
            cursor: pointer;
            margin-bottom: 40px;
        }
        .start-btn:active { opacity: 0.8; }

        .presets {
            display: flex;
            gap: 20px;
        }
        .preset-btn {
            background: none;
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: rgba(255, 255, 255, 0.5);
            padding: 8px 20px;
            font-size: 18px;
            border-radius: 4px;
            cursor: pointer;
            font-family: inherit;
        }

        /* 计时界面样式 */
        #timer-screen {
            display: none;
            height: 100%;
            width: 100%;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .display-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            transform: skewX(-5deg); 
        }
        .digit-box {
            display: grid;
            place-items: center;
            position: relative;
            width: 15vw;
        }
        .colon-box {
            display: grid;
            place-items: center;
            width: 6vw;
            margin-bottom: 2vw;
        }
        .sign-box {
            display: grid;
            place-items: center;
            width: 8vw;
        }
        .digit-text {
            grid-area: 1 / 1;
            font-size: 26vw;
            line-height: 1;
            text-align: center;
        }
        .ghost { color: rgba(255, 255, 255, 0.03); z-index: 1; }
        .active {
            color: #ffffff;
            z-index: 2;
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
            transition: color 0.3s ease;
        }

        #reset-btn {
            position: absolute;
            bottom: 10%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 30px;
            border-radius: 2px;
            font-size: 14px;
            font-family: -apple-system, sans-serif;
            letter-spacing: 4px;
            cursor: pointer;
            z-index: 10;
        }

        .warning .active { color: #ffff00; text-shadow: 0 0 15px rgba(255, 255, 0, 0.4); }
        .danger .active { color: #ff0000; text-shadow: 0 0 20px rgba(255, 0, 0, 0.5); }
        .dim { opacity: 0.3; }
        
        #status-bar {
            position: absolute;
            bottom: 20px;
            font-size: 10px;
            opacity: 0.15;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
            width: 100%;
            font-family: -apple-system, sans-serif;
        }
    </style>
</head>
<body onclick="handleUserInteraction()" ontouchstart="handleUserInteraction()">

    <!-- 设置界面 -->
    <div id="setup">
        <div class="setup-title">Set Timer Duration</div>
        
        <div class="adjuster-container">
            <!-- 分钟调整 -->
            <div class="adjuster-group">
                <div class="adj-btn" onclick="adjTime(60)">+</div>
                <div class="setup-display" id="setup-mins">10</div>
                <div class="adj-btn" onclick="adjTime(-60)">-</div>
            </div>
            
            <div class="setup-display">:</div>
            
            <!-- 秒钟调整 -->
            <div class="adjuster-group">
                <div class="adj-btn" onclick="adjTime(1)">+</div>
                <div class="setup-display" id="setup-secs">00</div>
                <div class="adj-btn" onclick="adjTime(-1)">-</div>
            </div>
        </div>

        <button class="start-btn" onclick="startTimer()">START</button>

        <div class="presets">
            <button class="preset-btn" onclick="setPreset(5)">5m</button>
            <button class="preset-btn" onclick="setPreset(10)">10m</button>
            <button class="preset-btn" onclick="setPreset(15)">15m</button>
            <button class="preset-btn" onclick="setPreset(20)">20m</button>
        </div>
        
        <div id="status-bar" style="position: relative; margin-top: 40px; bottom: auto;">READY TO CONFIGURE</div>
    </div>

    <!-- 计时界面 -->
    <div id="timer-screen" onclick="togglePause()">
        <div class="display-wrapper" id="main-display">
            <div class="sign-box"><div class="digit-text active" id="sign"></div></div>
            <div class="digit-box"><div class="digit-text ghost">8</div><div class="digit-text active" id="m1">0</div></div>
            <div class="digit-box"><div class="digit-text ghost">8</div><div class="digit-text active" id="m2">0</div></div>
            <div class="colon-box"><div class="digit-text ghost">:</div><div class="digit-text active">:</div></div>
            <div class="digit-box"><div class="digit-text ghost">8</div><div class="digit-text active" id="s1">0</div></div>
            <div class="digit-box"><div class="digit-text ghost">8</div><div class="digit-text active" id="s2">0</div></div>
        </div>
        <button id="reset-btn" onclick="event.stopPropagation(); reset()">RESET</button>
    </div>

    <script>
        let setupTime = 600; // 默认10分钟 (秒)
        let timeLeft = 0;
        let timerId = null;
        let isActive = false;
        let audioCtx = null;
        let wakeLock = null;

        const setupScreen = document.getElementById('setup');
        const timerScreen = document.getElementById('timer-screen');
        const mainDisplay = document.getElementById('main-display');
        const statusBar = document.getElementById('status-bar');

        const elMinsSetup = document.getElementById('setup-mins');
        const elSecsSetup = document.getElementById('setup-secs');

        const elSign = document.getElementById('sign');
        const elM1 = document.getElementById('m1');
        const elM2 = document.getElementById('m2');
        const elS1 = document.getElementById('s1');
        const elS2 = document.getElementById('s2');

        // 手动调整时间逻辑
        function adjTime(delta) {
            if (window.navigator.vibrate) window.navigator.vibrate(10); // 短震动
            setupTime += delta;
            if (setupTime < 1) setupTime = 1; // 最小1秒
            if (setupTime > 5999) setupTime = 5999; // 最大99:59
            updateSetupDisplay();
        }

        function setPreset(mins) {
            setupTime = mins * 60;
            updateSetupDisplay();
        }
        // 注册 Service Worker 以支持离线使用
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('./sw.js')
                    .then(reg => console.log('离线缓存已就绪'))
                    .catch(err => console.log('注册失败', err));
            });
        }

        function updateSetupDisplay() {
            const mins = Math.floor(setupTime / 60).toString().padStart(2, '0');
            const secs = (setupTime % 60).toString().padStart(2, '0');
            elMinsSetup.innerText = mins;
            elSecsSetup.innerText = secs;
        }

        function handleUserInteraction() {
            unlockAudio();
            if (isActive) requestWakeLock();
        }

        async function requestWakeLock() {
            if ('wakeLock' in navigator) {
                try {
                    if (wakeLock !== null) return;
                    wakeLock = await navigator.wakeLock.request('screen');
                    statusBar.innerText = "BELL READY | WAKE LOCK ON";
                    wakeLock.addEventListener('release', () => { wakeLock = null; });
                } catch (err) { console.error(err); }
            }
        }

        function releaseWakeLock() {
            if (wakeLock !== null) {
                wakeLock.release();
                wakeLock = null;
            }
        }

        function unlockAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function startTimer() {
            isActive = true;
            timeLeft = setupTime;
            setupScreen.style.display = 'none';
            timerScreen.style.display = 'flex';
            requestWakeLock();
            updateDisplay();
            if (timerId) clearInterval(timerId);
            timerId = setInterval(tick, 1000);
        }

        function tick() {
            if (!isActive) return;
            timeLeft--;
            updateDisplay();
            if (timeLeft === 180) playBell(1);
            else if (timeLeft === 60) playBell(2);
            else if (timeLeft === 0) playBell(3);
        }

        function updateDisplay() {
            const absTime = Math.abs(timeLeft);
            const mins = Math.floor(absTime / 60).toString().padStart(2, '0');
            const secs = (absTime % 60).toString().padStart(2, '0');
            elSign.innerText = timeLeft < 0 ? '-' : '';
            elM1.innerText = mins[0] || '0';
            elM2.innerText = mins[1] || '0';
            elS1.innerText = secs[0] || '0';
            elS2.innerText = secs[1] || '0';
            mainDisplay.classList.remove('warning', 'danger');
            if (timeLeft < 0 || timeLeft <= 10) mainDisplay.classList.add('danger');
            else if (timeLeft <= 60) mainDisplay.classList.add('warning');
        }

        function togglePause() {
            isActive = !isActive;
            timerScreen.classList.toggle('dim', !isActive);
            if (isActive) requestWakeLock();
            else releaseWakeLock();
        }

        function reset() {
            clearInterval(timerId);
            isActive = false;
            releaseWakeLock();
            setupScreen.style.display = 'flex';
            timerScreen.style.display = 'none';
            statusBar.innerText = "READY TO START";
            updateSetupDisplay();
        }

        function playBell(count) {
            if (!audioCtx) return;
            function strike(timeOffset) {
                const now = audioCtx.currentTime + timeOffset;
                const frequencies = [700, 1050, 1470, 2100, 2800];
                const gains = [0.4, 0.2, 0.15, 0.1, 0.05];
                const decays = [1.5, 1.0, 0.8, 0.5, 0.3];
                frequencies.forEach((freq, i) => {
                    const osc = audioCtx.createOscillator();
                    const gainNode = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, now);
                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(gains[i], now + 0.01);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + decays[i]);
                    osc.connect(gainNode);
                    gainNode.connect(audioCtx.destination);
                    osc.start(now);
                    osc.stop(now + decays[i] + 0.1);
                });
            }
            for (let i = 0; i < count; i++) strike(i * 0.8);
        }
        
        // 初始化显示
        updateSetupDisplay();
    </script>
</body>
</html>
