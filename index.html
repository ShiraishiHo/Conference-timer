<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <!-- 引入最经典的 Digital-7 电子表字体 -->
    <link href="https://fonts.cdnfonts.com/css/digital-7-mono" rel="stylesheet">
    <title>学术会议倒计时</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            height: 100%; 
            background-color: #000000; 
            color: #ffffff; 
            /* 使用标准的 Digital-7 字体 */
            font-family: 'Digital-7 Mono', sans-serif;
            overflow: hidden;
            user-select: none;
        }
        
        /* 设置界面使用系统字体，确保清晰 */
        #setup {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, sans-serif;
        }
        .title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5em;
            opacity: 0.3;
            margin-bottom: 50px;
        }
        .presets {
            display: flex;
            gap: 30px;
            margin-bottom: 60px;
        }
        .btn {
            background: none;
            border: none;
            color: white;
            font-size: 60px;
            font-weight: bold;
            cursor: pointer;
            font-family: 'Digital-7 Mono';
        }

        #timer-screen {
            display: none;
            height: 100%;
            width: 100%;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            position: relative;
        }

        /* 计时器总容器 */
        .display-wrapper {
            display: flex;
            align-items: center;
            justify-content: center;
            /* 稍微倾斜，模拟电子表屏幕的视角感 */
            transform: skewX(-5deg); 
        }

        /* 单个数位方格 */
        .digit-box {
            display: grid;
            place-items: center;
            position: relative;
            width: 15vw; /* 严格固定宽度 */
        }

        .colon-box {
            display: grid;
            place-items: center;
            width: 6vw;
            margin-bottom: 2vw;
        }

        .sign-box {
            display: grid;
            place-items: center;
            width: 8vw;
        }

        .digit-text {
            grid-area: 1 / 1;
            font-size: 26vw; /* 调大字号 */
            line-height: 1;
            text-align: center;
        }

        /* 极淡的液晶底纹：模拟未通电的 8 */
        .ghost {
            color: rgba(255, 255, 255, 0.03);
            z-index: 1;
        }

        /* 真实数字：模拟通电的发光段位 */
        .active {
            color: #ffffff;
            z-index: 2;
            /* 模拟液晶屏的轻微溢光 */
            text-shadow: 0 0 10px rgba(255, 255, 255, 0.3);
            transition: color 0.3s ease;
        }

        #reset-btn {
            position: absolute;
            bottom: 10%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 10px 30px;
            border-radius: 2px;
            font-size: 14px;
            font-family: -apple-system, sans-serif;
            letter-spacing: 4px;
            cursor: pointer;
            z-index: 10;
        }

        /* 状态颜色：经典电子表警示色 */
        .warning .active { color: #ffff00; text-shadow: 0 0 15px rgba(255, 255, 0, 0.4); }
        .danger .active { color: #ff0000; text-shadow: 0 0 20px rgba(255, 0, 0, 0.5); }
        .dim { opacity: 0.3; }
        
        #status-bar {
            position: absolute;
            bottom: 20px;
            font-size: 10px;
            opacity: 0.15;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
            width: 100%;
            font-family: -apple-system, sans-serif;
        }
    </style>
</head>
<body onclick="handleUserInteraction()" ontouchstart="handleUserInteraction()">

    <div id="setup">
        <div class="title">Academic Timer</div>
        <div class="presets">
            <button class="btn" onclick="startTimer(5)">5</button>
            <button class="btn" onclick="startTimer(10)">10</button>
            <button class="btn" onclick="startTimer(15)">15</button>
            <button class="btn" onclick="startTimer(20)">20</button>
        </div>
        <div id="status-bar">READY TO START</div>
    </div>

    <div id="timer-screen" onclick="togglePause()">
        <div class="display-wrapper" id="main-display">
            <!-- 负号 -->
            <div class="sign-box">
                <div class="digit-text active" id="sign"></div>
            </div>
            <!-- 分钟十位 -->
            <div class="digit-box">
                <div class="digit-text ghost">8</div>
                <div class="digit-text active" id="m1">0</div>
            </div>
            <!-- 分钟个位 -->
            <div class="digit-box">
                <div class="digit-text ghost">8</div>
                <div class="digit-text active" id="m2">0</div>
            </div>
            <!-- 冒号 -->
            <div class="colon-box">
                <div class="digit-text ghost">:</div>
                <div class="digit-text active">:</div>
            </div>
            <!-- 秒钟十位 -->
            <div class="digit-box">
                <div class="digit-text ghost">8</div>
                <div class="digit-text active" id="s1">0</div>
            </div>
            <!-- 秒钟个位 -->
            <div class="digit-box">
                <div class="digit-text ghost">8</div>
                <div class="digit-text active" id="s2">0</div>
            </div>
        </div>
        <button id="reset-btn" onclick="event.stopPropagation(); reset()">RESET</button>
    </div>

    <script>
        let timeLeft = 0;
        let timerId = null;
        let isActive = false;
        let audioCtx = null;
        let wakeLock = null;

        const setupScreen = document.getElementById('setup');
        const timerScreen = document.getElementById('timer-screen');
        const mainDisplay = document.getElementById('main-display');
        const statusBar = document.getElementById('status-bar');

        const elSign = document.getElementById('sign');
        const elM1 = document.getElementById('m1');
        const elM2 = document.getElementById('m2');
        const elS1 = document.getElementById('s1');
        const elS2 = document.getElementById('s2');

        function handleUserInteraction() {
            unlockAudio();
            if (isActive) requestWakeLock();
        }

        async function requestWakeLock() {
            if ('wakeLock' in navigator) {
                try {
                    if (wakeLock !== null) return;
                    wakeLock = await navigator.wakeLock.request('screen');
                    statusBar.innerText = "BELL READY | WAKE LOCK ON";
                    wakeLock.addEventListener('release', () => { wakeLock = null; });
                } catch (err) { console.error(err); }
            }
        }

        function releaseWakeLock() {
            if (wakeLock !== null) {
                wakeLock.release();
                wakeLock = null;
            }
        }

        document.addEventListener('visibilitychange', async () => {
            if (wakeLock !== null && document.visibilityState === 'visible' && isActive) {
                requestWakeLock();
            }
        });

        function unlockAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function startTimer(minutes) {
            isActive = true;
            timeLeft = minutes * 60;
            setupScreen.style.display = 'none';
            timerScreen.style.display = 'flex';
            requestWakeLock();
            updateDisplay();
            if (timerId) clearInterval(timerId);
            timerId = setInterval(tick, 1000);
        }

        function tick() {
            if (!isActive) return;
            timeLeft--;
            updateDisplay();
            if (timeLeft === 180) playBell(1);
            else if (timeLeft === 60) playBell(2);
            else if (timeLeft === 0) playBell(3);
        }

        function updateDisplay() {
            const absTime = Math.abs(timeLeft);
            const mins = Math.floor(absTime / 60).toString().padStart(2, '0');
            const secs = (absTime % 60).toString().padStart(2, '0');
            
            elSign.innerText = timeLeft < 0 ? '-' : '';
            elM1.innerText = mins[0];
            elM2.innerText = mins[1];
            elS1.innerText = secs[0];
            elS2.innerText = secs[1];
            
            mainDisplay.classList.remove('warning', 'danger');
            if (timeLeft < 0 || timeLeft <= 10) mainDisplay.classList.add('danger');
            else if (timeLeft <= 60) mainDisplay.classList.add('warning');
        }

        function togglePause() {
            isActive = !isActive;
            timerScreen.classList.toggle('dim', !isActive);
            if (isActive) requestWakeLock();
            else releaseWakeLock();
        }

        function reset() {
            clearInterval(timerId);
            isActive = false;
            releaseWakeLock();
            setupScreen.style.display = 'flex';
            timerScreen.style.display = 'none';
            statusBar.innerText = "READY TO START";
        }

        function playBell(count) {
            if (!audioCtx) return;
            function strike(timeOffset) {
                const now = audioCtx.currentTime + timeOffset;
                const frequencies = [700, 1050, 1470, 2100, 2800];
                const gains = [0.4, 0.2, 0.15, 0.1, 0.05];
                const decays = [1.5, 1.0, 0.8, 0.5, 0.3];
                frequencies.forEach((freq, i) => {
                    const osc = audioCtx.createOscillator();
                    const gainNode = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, now);
                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(gains[i], now + 0.01);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + decays[i]);
                    osc.connect(gainNode);
                    gainNode.connect(audioCtx.destination);
                    osc.start(now);
                    osc.stop(now + decays[i] + 0.1);
                });
            }
            for (let i = 0; i < count; i++) strike(i * 0.8);
        }
    </script>
</body>
</html>
