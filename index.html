<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>学术会议倒计时</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            height: 100%; 
            background-color: #000000; 
            color: #ffffff; 
            font-family: 'Courier New', Courier, monospace; 
            overflow: hidden;
            user-select: none;
        }
        #setup {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
        }
        .title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5em;
            opacity: 0.3;
            margin-bottom: 50px;
        }
        .presets {
            display: flex;
            gap: 30px;
            margin-bottom: 60px;
        }
        .btn {
            background: none;
            border: none;
            color: white;
            font-size: 60px;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
        }
        #timer-screen {
            display: none;
            height: 100%;
            width: 100%;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        #display {
            font-size: 28vw;
            font-weight: bold;
            line-height: 1;
        }
        .warning { color: #eab308; }
        .danger { color: #dc2626; }
        .dim { opacity: 0.4; }
        
        /* 测试按钮 */
        #test-sound {
            position: absolute;
            bottom: 20px;
            font-size: 10px;
            opacity: 0.2;
            background: none;
            border: 1px solid white;
            color: white;
            padding: 5px 10px;
            border-radius: 5px;
        }
    </style>
</head>
<body>

    <div id="setup">
        <div class="title">Academic Timer</div>
        <div class="presets">
            <button class="btn" onclick="startTimer(5)">5</button>
            <button class="btn" onclick="startTimer(10)">10</button>
            <button class="btn" onclick="startTimer(15)">15</button>
            <button class="btn" onclick="startTimer(20)">20</button>
        </div>
        <button id="test-sound" onclick="playBeep(1)">测试铃声 (Test Sound)</button>
    </div>

    <div id="timer-screen" onclick="togglePause()" ondblclick="reset()">
        <div id="display">00:00</div>
    </div>

    <script>
        let timeLeft = 0;
        let timerId = null;
        let isActive = false;
        let lastBeepedAt = null;
        
        // 关键：提前定义音频上下文
        let audioCtx = null;

        const setupScreen = document.getElementById('setup');
        const timerScreen = document.getElementById('timer-screen');
        const display = document.getElementById('display');

        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            // iOS 必须在用户点击时 resume
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function startTimer(minutes) {
            initAudio(); // 用户点击数字时激活音频
            
            timeLeft = minutes * 60;
            isActive = true;
            lastBeepedAt = null;
            
            setupScreen.style.display = 'none';
            timerScreen.style.display = 'flex';
            
            updateDisplay();
            if (timerId) clearInterval(timerId);
            timerId = setInterval(tick, 1000);
        }

        function tick() {
            if (!isActive) return;
            if (timeLeft > 0) {
                timeLeft--;
                updateDisplay();
                
                // 提醒逻辑：3分钟响1声，1分钟响2声
                if (timeLeft === 180 && lastBeepedAt !== 180) {
                    playBeep(1);
                    lastBeepedAt = 180;
                } else if (timeLeft === 60 && lastBeepedAt !== 60) {
                    playBeep(2);
                    lastBeepedAt = 60;
                }
            } else {
                clearInterval(timerId);
                isActive = false;
                playBeep(3); // 结束响3声
                display.classList.add('dim');
            }
        }

        function updateDisplay() {
            const mins = Math.floor(timeLeft / 60).toString().padStart(2, '0');
            const secs = (timeLeft % 60).toString().padStart(2, '0');
            display.innerText = `${mins}:${secs}`;
            display.classList.remove('warning', 'danger');
            if (timeLeft <= 10) display.classList.add('danger');
            else if (timeLeft <= 60) display.classList.add('warning');
        }

        function togglePause() {
            initAudio(); // 暂停/继续时也尝试激活
            isActive = !isActive;
            display.classList.toggle('dim', !isActive);
        }

        function reset() {
            clearInterval(timerId);
            isActive = false;
            setupScreen.style.display = 'flex';
            timerScreen.style.display = 'none';
        }

        function playBeep(count) {
            initAudio();
            if (!audioCtx) return;

            function makeNoise(timeOffset) {
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                
                osc.type = 'sine';
                osc.frequency.setValueAtTime(880, audioCtx.currentTime + timeOffset);
                
                gain.gain.setValueAtTime(0, audioCtx.currentTime + timeOffset);
                gain.gain.linearRampToValueAtTime(0.2, audioCtx.currentTime + timeOffset + 0.01);
                gain.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + timeOffset + 0.3);
                
                osc.start(audioCtx.currentTime + timeOffset);
                osc.stop(audioCtx.currentTime + timeOffset + 0.3);
            }

            for (let i = 0; i < count; i++) {
                makeNoise(i * 0.4);
            }
        }
    </script>
</body>
</html>
