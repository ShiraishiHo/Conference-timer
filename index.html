<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>学术会议倒计时</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            height: 100%; 
            background-color: #000000; 
            color: #ffffff; 
            font-family: 'Courier New', Courier, monospace; 
            overflow: hidden;
            user-select: none;
        }
        #setup {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
        }
        .title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5em;
            opacity: 0.3;
            margin-bottom: 50px;
        }
        .presets {
            display: flex;
            gap: 30px;
            margin-bottom: 60px;
        }
        .btn {
            background: none;
            border: none;
            color: white;
            font-size: 60px;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
        }
        #timer-screen {
            display: none;
            height: 100%;
            width: 100%;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
        }
        #display {
            font-size: 24vw;
            font-weight: bold;
            line-height: 1;
            transition: color 0.3s ease;
            margin-bottom: 20px;
        }
        /* 新增重置按钮样式 */
        #reset-btn {
            position: absolute;
            bottom: 15%;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: white;
            padding: 12px 40px;
            border-radius: 30px;
            font-size: 18px;
            font-family: inherit;
            letter-spacing: 2px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        #reset-btn:active {
            background: rgba(255, 255, 255, 0.3);
            transform: scale(0.95);
        }

        .warning { color: #eab308; }
        .danger { color: #dc2626; }
        .dim { opacity: 0.4; }
        
        #status-bar {
            position: absolute;
            bottom: 20px;
            font-size: 10px;
            opacity: 0.2;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-align: center;
            width: 100%;
        }
    </style>
</head>
<body onclick="handleUserInteraction()" ontouchstart="handleUserInteraction()">

    <div id="setup">
        <div class="title">Academic Timer</div>
        <div class="presets">
            <button class="btn" onclick="startTimer(5)">5</button>
            <button class="btn" onclick="startTimer(10)">10</button>
            <button class="btn" onclick="startTimer(15)">15</button>
            <button class="btn" onclick="startTimer(20)">20</button>
        </div>
        <div id="status-bar">点击数字开始计时</div>
    </div>

    <div id="timer-screen" onclick="togglePause()">
        <div id="display">00:00</div>
        <!-- 显式的重置按钮 -->
        <button id="reset-btn" onclick="event.stopPropagation(); reset()">RESET</button>
    </div>

    <script>
        let timeLeft = 0;
        let timerId = null;
        let isActive = false;
        let audioCtx = null;
        let wakeLock = null;

        const setupScreen = document.getElementById('setup');
        const timerScreen = document.getElementById('timer-screen');
        const display = document.getElementById('display');
        const statusBar = document.getElementById('status-bar');

        function handleUserInteraction() {
            unlockAudio();
            if (isActive) requestWakeLock();
        }

        async function requestWakeLock() {
            if ('wakeLock' in navigator) {
                try {
                    if (wakeLock !== null) return;
                    wakeLock = await navigator.wakeLock.request('screen');
                    statusBar.innerText = "铃声就绪 | 屏幕常亮已开启";
                    wakeLock.addEventListener('release', () => { wakeLock = null; });
                } catch (err) { console.error(err); }
            }
        }

        function releaseWakeLock() {
            if (wakeLock !== null) {
                wakeLock.release();
                wakeLock = null;
            }
        }

        document.addEventListener('visibilitychange', async () => {
            if (wakeLock !== null && document.visibilityState === 'visible' && isActive) {
                requestWakeLock();
            }
        });

        function unlockAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        }

        function startTimer(minutes) {
            isActive = true;
            timeLeft = minutes * 60;
            setupScreen.style.display = 'none';
            timerScreen.style.display = 'flex';
            requestWakeLock();
            updateDisplay();
            if (timerId) clearInterval(timerId);
            timerId = setInterval(tick, 1000);
        }

        function tick() {
            if (!isActive) return;
            timeLeft--;
            updateDisplay();
            if (timeLeft === 180) playBell(1);
            else if (timeLeft === 60) playBell(2);
            else if (timeLeft === 0) playBell(3);
        }

        function updateDisplay() {
            const absTime = Math.abs(timeLeft);
            const mins = Math.floor(absTime / 60).toString().padStart(2, '0');
            const secs = (absTime % 60).toString().padStart(2, '0');
            const sign = timeLeft < 0 ? '-' : '';
            display.innerText = `${sign}${mins}:${secs}`;
            display.classList.remove('warning', 'danger');
            if (timeLeft < 0 || timeLeft <= 10) display.classList.add('danger');
            else if (timeLeft <= 60) display.classList.add('warning');
        }

        function togglePause() {
            isActive = !isActive;
            display.classList.toggle('dim', !isActive);
            if (isActive) requestWakeLock();
            else releaseWakeLock();
        }

        function reset() {
            clearInterval(timerId);
            isActive = false;
            releaseWakeLock();
            setupScreen.style.display = 'flex';
            timerScreen.style.display = 'none';
            statusBar.innerText = "点击数字开始计时";
        }

        function playBell(count) {
            if (!audioCtx) return;
            function strike(timeOffset) {
                const now = audioCtx.currentTime + timeOffset;
                const frequencies = [700, 1050, 1470, 2100, 2800];
                const gains = [0.4, 0.2, 0.15, 0.1, 0.05];
                const decays = [1.5, 1.0, 0.8, 0.5, 0.3];
                frequencies.forEach((freq, i) => {
                    const osc = audioCtx.createOscillator();
                    const gainNode = audioCtx.createGain();
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, now);
                    gainNode.gain.setValueAtTime(0, now);
                    gainNode.gain.linearRampToValueAtTime(gains[i], now + 0.01);
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + decays[i]);
                    osc.connect(gainNode);
                    gainNode.connect(audioCtx.destination);
                    osc.start(now);
                    osc.stop(now + decays[i] + 0.1);
                });
            }
            for (let i = 0; i < count; i++) strike(i * 0.8);
        }
    </script>
</body>
</html>
