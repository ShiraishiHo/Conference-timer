<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>学术会议倒计时</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            height: 100%; 
            background-color: #000000; 
            color: #ffffff; 
            font-family: 'Courier New', Courier, monospace; 
            overflow: hidden;
            user-select: none;
        }
        #setup {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
        }
        .title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5em;
            opacity: 0.3;
            margin-bottom: 50px;
        }
        .presets {
            display: flex;
            gap: 30px;
            margin-bottom: 60px;
        }
        .btn {
            background: none;
            border: none;
            color: white;
            font-size: 60px;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
        }
        #timer-screen {
            display: none;
            height: 100%;
            width: 100%;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }
        #display {
            font-size: 28vw;
            font-weight: bold;
            line-height: 1;
        }
        .warning { color: #eab308; }
        .danger { color: #dc2626; }
        .dim { opacity: 0.4; }
        
        #audio-status {
            position: absolute;
            bottom: 20px;
            font-size: 10px;
            opacity: 0.2;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
    </style>
</head>
<body onclick="unlockAudio()" ontouchstart="unlockAudio()">

    <div id="setup">
        <div class="title">Academic Timer</div>
        <div class="presets">
            <button class="btn" onclick="startTimer(5)">5</button>
            <button class="btn" onclick="startTimer(10)">10</button>
            <button class="btn" onclick="startTimer(15)">15</button>
            <button class="btn" onclick="startTimer(20)">20</button>
        </div>
        <div id="audio-status">点击屏幕激活铃声 (Tap to unlock Bell)</div>
    </div>

    <div id="timer-screen" onclick="togglePause()" ondblclick="reset()">
        <div id="display">00:00</div>
    </div>

    <script>
        let timeLeft = 0;
        let timerId = null;
        let isActive = false;
        let lastBeepedAt = null;
        let audioCtx = null;

        const setupScreen = document.getElementById('setup');
        const timerScreen = document.getElementById('timer-screen');
        const display = document.getElementById('display');

        function unlockAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            document.getElementById('audio-status').innerText = "铃声已就绪 (Bell Ready)";
        }

        function startTimer(minutes) {
            unlockAudio();
            timeLeft = minutes * 60;
            isActive = true;
            lastBeepedAt = null;
            setupScreen.style.display = 'none';
            timerScreen.style.display = 'flex';
            updateDisplay();
            if (timerId) clearInterval(timerId);
            timerId = setInterval(tick, 1000);
        }

        function tick() {
            if (!isActive) return;
            if (timeLeft > 0) {
                timeLeft--;
                updateDisplay();
                // 3分钟响1声，1分钟响2声
                if (timeLeft === 180 && lastBeepedAt !== 180) { playBell(1); lastBeepedAt = 180; }
                else if (timeLeft === 60 && lastBeepedAt !== 60) { playBell(2); lastBeepedAt = 60; }
            } else {
                clearInterval(timerId);
                isActive = false;
                playBell(3); // 结束响3声
                display.classList.add('dim');
            }
        }

        function updateDisplay() {
            const mins = Math.floor(timeLeft / 60).toString().padStart(2, '0');
            const secs = (timeLeft % 60).toString().padStart(2, '0');
            display.innerText = `${mins}:${secs}`;
            display.classList.remove('warning', 'danger');
            if (timeLeft <= 10) display.classList.add('danger');
            else if (timeLeft <= 60) display.classList.add('warning');
        }

        function togglePause() {
            unlockAudio();
            isActive = !isActive;
            display.classList.toggle('dim', !isActive);
        }

        function reset() {
            clearInterval(timerId);
            isActive = false;
            setupScreen.style.display = 'flex';
            timerScreen.style.display = 'none';
        }

        // 模拟会议铃声 (Conference Bell Synthesis)
        function playBell(count) {
            if (!audioCtx) unlockAudio();
            
            function strike(timeOffset) {
                const now = audioCtx.currentTime + timeOffset;
                
                // 铃声由多个不和谐的频率组成
                // 基频 700Hz + 泛音
                const frequencies = [700, 1050, 1470, 2100, 2800];
                const gains = [0.4, 0.2, 0.15, 0.1, 0.05];
                const decays = [1.5, 1.0, 0.8, 0.5, 0.3];

                frequencies.forEach((freq, i) => {
                    const osc = audioCtx.createOscillator();
                    const gainNode = audioCtx.createGain();
                    
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(freq, now);
                    
                    gainNode.gain.setValueAtTime(0, now);
                    // 极快的攻击 (Attack)
                    gainNode.gain.linearRampToValueAtTime(gains[i], now + 0.01);
                    // 指数级衰减 (Decay)
                    gainNode.gain.exponentialRampToValueAtTime(0.001, now + decays[i]);
                    
                    osc.connect(gainNode);
                    gainNode.connect(audioCtx.destination);
                    
                    osc.start(now);
                    osc.stop(now + decays[i] + 0.1);
                });
            }

            for (let i = 0; i < count; i++) {
                // 每次响铃间隔 0.8 秒，听起来更从容
                strike(i * 0.8);
            }
        }
    </script>
</body>
</html>
