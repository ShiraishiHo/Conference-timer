<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <title>学术会议倒计时</title>
    <style>
        /* 极致极简主义样式 */
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body, html { 
            height: 100%; 
            background-color: #000000; 
            color: #ffffff; 
            font-family: 'Courier New', Courier, monospace; 
            overflow: hidden;
            user-select: none;
        }

        /* 设置界面 */
        #setup {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            transition: opacity 0.5s;
        }
        .title {
            font-size: 14px;
            text-transform: uppercase;
            letter-spacing: 0.5em;
            opacity: 0.3;
            margin-bottom: 50px;
        }
        .presets {
            display: flex;
            gap: 30px;
            margin-bottom: 60px;
        }
        .btn {
            background: none;
            border: none;
            color: white;
            font-size: 60px;
            font-weight: bold;
            cursor: pointer;
            font-family: inherit;
            transition: transform 0.2s;
            border-bottom: 2px solid transparent;
        }
        .btn:active { transform: scale(0.9); }
        
        .custom-area {
            display: flex;
            align-items: center;
            gap: 10px;
            opacity: 0.2;
        }
        .custom-area:focus-within { opacity: 1; }
        #custom-input {
            background: none;
            border: none;
            border-bottom: 1px solid rgba(255,255,255,0.3);
            color: white;
            width: 80px;
            text-align: center;
            font-size: 20px;
            outline: none;
            font-family: inherit;
        }

        /* 计时界面 */
        #timer-screen {
            display: none;
            height: 100%;
            width: 100%;
            align-items: center;
            justify-content: center;
            cursor: pointer;
            position: relative;
        }
        #display {
            font-size: 28vw;
            font-weight: bold;
            line-height: 1;
            letter-spacing: -0.05em;
            transition: color 0.5s;
        }
        .paused-msg {
            position: absolute;
            bottom: 40px;
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1em;
            opacity: 0.2;
            display: none;
        }

        /* 颜色状态 */
        .warning { color: #eab308; } /* 黄色 */
        .danger { color: #dc2626; }  /* 红色 */
        .dim { opacity: 0.4; }
    </style>
</head>
<body>

    <!-- 设置界面 -->
    <div id="setup">
        <div class="title">Academic Timer</div>
        <div class="presets">
            <button class="btn" onclick="startTimer(5)">5</button>
            <button class="btn" onclick="startTimer(10)">10</button>
            <button class="btn" onclick="startTimer(15)">15</button>
            <button class="btn" onclick="startTimer(20)">20</button>
        </div>
        <div class="custom-area">
            <input type="number" id="custom-input" placeholder="Custom">
            <span style="font-size: 10px; text-transform: uppercase;">min</span>
        </div>
    </div>

    <!-- 计时界面 -->
    <div id="timer-screen" onclick="togglePause()" ondblclick="reset()">
        <div id="display">00:00</div>
        <div id="paused-msg" class="paused-msg">Paused</div>
    </div>

    <script>
        let timeLeft = 0;
        let timerId = null;
        let isActive = false;
        let lastBeepedAt = null;

        const setupScreen = document.getElementById('setup');
        const timerScreen = document.getElementById('timer-screen');
        const display = document.getElementById('display');
        const pausedMsg = document.getElementById('paused-msg');
        const customInput = document.getElementById('custom-input');

        // 监听自定义输入回车
        customInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter' && customInput.value) {
                startTimer(parseInt(customInput.value));
            }
        });

        function startTimer(minutes) {
            timeLeft = minutes * 60;
            isActive = true;
            lastBeepedAt = null;
            
            setupScreen.style.display = 'none';
            timerScreen.style.display = 'flex';
            
            updateDisplay();
            
            if (timerId) clearInterval(timerId);
            timerId = setInterval(tick, 1000);

            // 尝试进入全屏
            if (document.documentElement.requestFullscreen) {
                document.documentElement.requestFullscreen().catch(() => {});
            }
        }

        function tick() {
            if (!isActive) return;

            if (timeLeft > 0) {
                timeLeft--;
                updateDisplay();
                checkAudioAlerts();
            } else {
                clearInterval(timerId);
                isActive = false;
                playBeep(3);
                display.classList.add('dim');
            }
        }

        function updateDisplay() {
            const mins = Math.floor(timeLeft / 60).toString().padStart(2, '0');
            const secs = (timeLeft % 60).toString().padStart(2, '0');
            display.innerText = `${mins}:${secs}`;

            // 颜色警示
            display.classList.remove('warning', 'danger');
            if (timeLeft <= 10) {
                display.classList.add('danger');
            } else if (timeLeft <= 60) {
                display.classList.add('warning');
            }
        }

        function togglePause() {
            isActive = !isActive;
            display.classList.toggle('dim', !isActive);
            pausedMsg.style.display = isActive ? 'none' : 'block';
        }

        function reset() {
            clearInterval(timerId);
            isActive = false;
            setupScreen.style.display = 'flex';
            timerScreen.style.display = 'none';
            display.classList.remove('dim');
            
            if (document.fullscreenElement) {
                document.exitFullscreen().catch(() => {});
            }
        }

        function checkAudioAlerts() {
            if (timeLeft === 180 && lastBeepedAt !== 180) { // 3 min
                playBeep(1);
                lastBeepedAt = 180;
            } else if (timeLeft === 60 && lastBeepedAt !== 60) { // 1 min
                playBeep(2);
                lastBeepedAt = 60;
            }
        }

        // Web Audio API 生成声音
        function playBeep(count) {
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            
            function beep(delay) {
                setTimeout(() => {
                    const osc = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    osc.connect(gain);
                    gain.connect(audioCtx.destination);
                    osc.type = 'sine';
                    osc.frequency.setValueAtTime(880, audioCtx.currentTime);
                    gain.gain.setValueAtTime(0, audioCtx.currentTime);
                    gain.gain.linearRampToValueAtTime(0.1, audioCtx.currentTime + 0.01);
                    gain.gain.exponentialRampToValueAtTime(0.0001, audioCtx.currentTime + 0.2);
                    osc.start();
                    osc.stop(audioCtx.currentTime + 0.2);
                }, delay);
            }

            for (let i = 0; i < count; i++) {
                beep(i * 300);
            }
        }
    </script>
</body>
</html>
